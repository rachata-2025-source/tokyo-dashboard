<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Kin Tokyo | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
        .active-tab { border-bottom: 3px solid #f97316; color: #f97316; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-orange-500 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">📊 Ma Kin Tokyo Dashboard</h1>
            <div id="syncStatus" class="text-sm bg-orange-600 px-3 py-1 rounded-full">เชื่อมต่อ Firestore แล้ว</div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        
        <section class="bg-white p-4 rounded-xl shadow-sm mb-8 flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-sm font-medium text-gray-600 mb-1">เลือกช่วงเวลา</label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <button onclick="setDateRange('today')" class="bg-gray-100 hover:bg-orange-100 p-2 rounded text-sm">วันนี้</button>
                    <button onclick="setDateRange('yesterday')" class="bg-gray-100 hover:bg-orange-100 p-2 rounded text-sm">เมื่อวาน</button>
                    <button onclick="setDateRange('week')" class="bg-gray-100 hover:bg-orange-100 p-2 rounded text-sm">สัปดาห์นี้</button>
                    <button onclick="setDateRange('month')" class="bg-gray-100 hover:bg-orange-100 p-2 rounded text-sm">เดือนนี้</button>
                </div>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="date" id="startDate" class="border p-2 rounded text-sm w-full">
                <input type="date" id="endDate" class="border p-2 rounded text-sm w-full">
                <button onclick="fetchData()" class="bg-orange-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-orange-600">ดึงข้อมูล</button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-l-4 border-orange-500">
                <p class="text-gray-500 text-sm">ยอดรวมยอดขาย</p>
                <h2 id="totalRevenue" class="text-3xl font-bold text-orange-600">฿0</h2>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">จำนวนบิลทั้งหมด</p>
                <h2 id="totalBills" class="text-3xl font-bold text-blue-600">0 บิล</h2>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-sm">ไส้ที่ขายดีที่สุด</p>
                <h2 id="bestSeller" class="text-2xl font-bold text-green-600">-</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div class="flex border-b mb-6 bg-white rounded-t-xl overflow-hidden">
                    <button onclick="switchView('bills')" id="tabBills" class="flex-1 py-3 px-4 font-bold active-tab transition-all">
                        📝 รายการบิล
                    </button>
                    <button onclick="switchView('summary')" id="tabSummary" class="flex-1 py-3 px-4 font-bold text-gray-500 hover:text-orange-500 transition-all">
                        🥙 สรุปตามไส้
                    </button>
                </div>

                <div id="billView">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        รายการบิล <span id="billCountLabel" class="ml-2 text-sm font-normal text-gray-400"></span>
                    </h3>
                    <div id="billContainer" class="space-y-4">
                        <p class="text-gray-400 italic text-center p-10">กรุณากดปุ่ม "ดึงข้อมูล"</p>
                    </div>
                </div>

                <div id="summaryView" class="hidden">
                    <h3 class="text-lg font-bold mb-4">🥙 รายงานสรุปยอดตามไส้</h3>
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-gray-600 text-sm">
                                <tr>
                                    <th class="p-4">ชื่อไส้ / รายการ</th>
                                    <th class="p-4 text-center">จำนวน (ชิ้น)</th>
                                    <th class="p-4 text-right">ยอดรวม (บาท)</th>
                                </tr>
                            </thead>
                            <tbody id="fillingSummaryTable" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm">
                    <h3 class="font-bold mb-4 border-b pb-2 text-orange-600">🏆 Top 10 ไส้ขายดี</h3>
                    <div id="fillingRank" class="space-y-3">
                        </div>
                </div>
                
                <div class="bg-white p-6 rounded-2xl shadow-sm">
                    <h3 class="font-bold mb-4 border-b pb-2 text-blue-600">📊 สัดส่วนรายได้</h3>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx6SGBBh979y6cjyOL75f5PdSr8AZkz0g",
            authDomain: "tokyo-order-app.firebaseapp.com",
            projectId: "tokyo-order-app",
            storageBucket: "tokyo-order-app.appspot.com",
            messagingSenderId: "411815226779", // ควรเปลี่ยนเป็น ID จริงของคุณ
            appId: "1:411815226779:web:373e1ca32daaac264cc53e"             // ควรเปลี่ยนเป็น ID จริงของคุณ
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lastFetchedBills = []; // เก็บข้อมูลไว้สลับ Tab โดยไม่ต้องโหลดใหม่

        // --- View Switching ---
        window.switchView = (view) => {
            const billView = document.getElementById('billView');
            const summaryView = document.getElementById('summaryView');
            const tabBills = document.getElementById('tabBills');
            const tabSummary = document.getElementById('tabSummary');

            if (view === 'bills') {
                billView.classList.remove('hidden');
                summaryView.classList.add('hidden');
                tabBills.classList.add('active-tab');
                tabSummary.classList.remove('active-tab');
                tabSummary.classList.add('text-gray-500');
            } else {
                billView.classList.add('hidden');
                summaryView.classList.remove('hidden');
                tabSummary.classList.add('active-tab');
                tabBills.classList.remove('active-tab');
                tabBills.classList.add('text-gray-500');
                renderFillingSummary(); // วาดตารางสรุปใหม่ทุกครั้งที่สลับมา
            }
        };

        // --- Date Logic ---
        window.setDateRange = (range) => {
            const startInput = document.getElementById('startDate');
            const endInput = document.getElementById('endDate');
            const now = new Date();
            let start = new Date();

            if (range === 'today') { /* no change */ }
            else if (range === 'yesterday') { start.setDate(now.getDate() - 1); now.setDate(now.getDate() - 1); }
            else if (range === 'week') { start.setDate(now.getDate() - now.getDay()); }
            else if (range === 'month') { start.setDate(1); }

            startInput.value = start.toISOString().split('T')[0];
            endInput.value = now.toISOString().split('T')[0];
            fetchData();
        };

        // --- Data Fetching ---
        window.fetchData = async () => {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const container = document.getElementById('billContainer');
            
            if (!start || !end) return alert('กรุณาเลือกวันที่');
            
            container.innerHTML = '<div class="text-center p-10 text-orange-500">⌛ กำลังดึงข้อมูลจาก Cloud...</div>';

            try {
                const q = query(
                    collection(db, "bills"),
                    where("date", ">=", start),
                    where("date", "<=", end),
                    orderBy("date", "desc")
                );

                const snap = await getDocs(q);
                lastFetchedBills = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                processAnalytics(lastFetchedBills);
                renderBillCards(lastFetchedBills);
                renderFillingSummary(); // เตรียมข้อมูลหน้าสรุปไว้ด้วย
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="text-red-500 italic p-10 text-center">เกิดข้อผิดพลาด: ${err.message}</div>`;
            }
        };

        function processAnalytics(bills) {
            let totalRevenue = 0;
            let fillingMap = {};

            bills.forEach(bill => {
                bill.pieces.forEach(p => {
                    const qty = parseInt(p.qty || 1);
                    const price = parseInt(p.price || 0);
                    totalRevenue += (price * qty);

                    const fillingName = p.items.join('+');
                    fillingMap[fillingName] = (fillingMap[fillingName] || 0) + qty;
                });
            });

            document.getElementById('totalRevenue').innerText = `฿${totalRevenue.toLocaleString()}`;
            document.getElementById('totalBills').innerText = `${bills.length} บิล`;
            document.getElementById('billCountLabel').innerText = `(${bills.length})`;

            const sortedFillings = Object.entries(fillingMap).sort((a, b) => b[1] - a[1]);
            const best = sortedFillings[0] ? `${sortedFillings[0][0]} (${sortedFillings[0][1]} ชิ้น)` : '-';
            document.getElementById('bestSeller').innerText = best;

            const rankDiv = document.getElementById('fillingRank');
            rankDiv.innerHTML = sortedFillings.slice(0, 10).map(([name, qty], i) => `
                <div class="flex justify-between items-center text-sm p-1 border-b border-gray-50 last:border-0">
                    <span class="text-gray-600 truncate mr-2">${i+1}. ${name}</span>
                    <span class="font-bold text-orange-600">${qty}</span>
                </div>
            `).join('');
        }

        function renderBillCards(bills) {
            const container = document.getElementById('billContainer');
            if (bills.length === 0) {
                container.innerHTML = '<p class="text-center p-10 text-gray-400">ไม่พบข้อมูลบิลในช่วงเวลานี้</p>';
                return;
            }

            container.innerHTML = bills.map(b => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-orange-200 transition-colors">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs font-bold text-orange-500 uppercase tracking-wider">${b.date} | ${b.time || ''}</span>
                            <h4 class="font-bold text-lg">คิวที่ #${b.billNo}</h4>
                        </div>
                        <span class="bg-orange-50 text-orange-600 text-xs px-3 py-1 rounded-full font-bold">
                            ${b.pieces.reduce((s,p)=> s + (p.qty||1), 0)} ชิ้น
                        </span>
                    </div>
                    <div class="text-sm text-gray-600 space-y-1 pl-2 border-l-2 border-gray-100">
                        ${b.pieces.map(p => `<div>• ${p.items.join('+')} <span class="text-gray-400 ml-1">x${p.qty}</span></div>`).join('')}
                    </div>
                    ${b.note ? `<div class="mt-3 text-xs text-blue-600 italic bg-blue-50 p-2 rounded-lg">📝 ${b.note}</div>` : ''}
                </div>
            `).join('');
        }

        // --- ใหม่: ฟังก์ชันแสดงสรุปยอดตามไส้ลงตาราง ---
        function renderFillingSummary() {
            const tableBody = document.getElementById('fillingSummaryTable');
            let fillingStats = {};

            lastFetchedBills.forEach(bill => {
                bill.pieces.forEach(p => {
                    const name = p.items.join('+');
                    const qty = parseInt(p.qty || 1);
                    const price = parseInt(p.price || 0);
                    
                    if (!fillingStats[name]) {
                        fillingStats[name] = { qty: 0, revenue: 0 };
                    }
                    fillingStats[name].qty += qty;
                    fillingStats[name].revenue += (price * qty);
                });
            });

            const sorted = Object.entries(fillingStats).sort((a, b) => b[1].qty - a[1].qty);

            if (sorted.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-gray-400 italic">ไม่มีข้อมูลการขาย</td></tr>';
                return;
            }

            tableBody.innerHTML = sorted.map(([name, stat]) => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 font-medium text-gray-700">${name}</td>
                    <td class="p-4 text-center font-bold text-orange-600">${stat.qty.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold text-gray-800">฿${stat.revenue.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        // ตั้งค่าเริ่มต้นเป็นวันนี้
        window.setDateRange('month');
    </script>
</body>
</html>
